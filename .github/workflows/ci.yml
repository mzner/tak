name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3 # v6.0.3
      - uses: actions/setup-go@v6.4.0 # v6.4.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3 # v6.0.3
      - uses: actions/setup-go@v6.4.0 # v6.4.0
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9.2.1 # v9.2.1
        with:
          version: latest
